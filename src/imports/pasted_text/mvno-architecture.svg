<svg width="680" height="760" viewBox="0 0 680 760" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="680" height="760" fill="#FFFFFF"/>

  <!-- Subscriber device -->
  <text x="40" y="30" font-size="12" fill="#5F5E5A">Subscriber device</text>
  <rect x="40" y="40" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="100" y="66" font-size="14" font-weight="bold" fill="#2C2C2A" text-anchor="middle">SIM / handset</text>

  <line x1="160" y1="62" x2="216" y2="62" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Host MNO container -->
  <rect x="220" y="20" width="440" height="120" rx="20" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="240" y="42" font-size="14" font-weight="bold" fill="#4A1B0C">Host MNO (leased)</text>
  <text x="240" y="58" font-size="12" fill="#712B13">Radio access network</text>

  <rect x="240" y="75" width="180" height="50" rx="10" fill="#F0997B" stroke="#D85A30" stroke-width="1"/>
  <text x="330" y="97" font-size="14" font-weight="bold" fill="#4A1B0C" text-anchor="middle">Cell towers</text>
  <text x="330" y="113" font-size="12" fill="#712B13" text-anchor="middle">Radio spectrum, antennas</text>

  <rect x="440" y="75" width="200" height="50" rx="10" fill="#F0997B" stroke="#D85A30" stroke-width="1"/>
  <text x="540" y="97" font-size="14" font-weight="bold" fill="#4A1B0C" text-anchor="middle">RAN gateway</text>
  <text x="540" y="113" font-size="12" fill="#712B13" text-anchor="middle">Hands traffic to MVNO core</text>

  <line x1="330" y1="125" x2="330" y2="176" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="125" x2="540" y2="176" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MVNO owned core network container -->
  <rect x="60" y="180" width="600" height="340" rx="20" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="80" y="202" font-size="14" font-weight="bold" fill="#26215C">MVNO owned core network</text>
  <text x="80" y="218" font-size="12" fill="#3C3489">Operated and controlled by the MVNO</text>

  <!-- Row 1 -->
  <rect x="80" y="235" width="170" height="56" rx="10" fill="#AFA9EC" stroke="#534AB7" stroke-width="1"/>
  <text x="165" y="259" font-size="14" font-weight="bold" fill="#26215C" text-anchor="middle">HLR / HSS</text>
  <text x="165" y="276" font-size="12" fill="#3C3489" text-anchor="middle">Subscriber identity, location</text>

  <rect x="270" y="235" width="170" height="56" rx="10" fill="#AFA9EC" stroke="#534AB7" stroke-width="1"/>
  <text x="355" y="259" font-size="14" font-weight="bold" fill="#26215C" text-anchor="middle">MSC / switching</text>
  <text x="355" y="276" font-size="12" fill="#3C3489" text-anchor="middle">Call and session routing</text>

  <rect x="460" y="235" width="180" height="56" rx="10" fill="#AFA9EC" stroke="#534AB7" stroke-width="1"/>
  <text x="550" y="259" font-size="14" font-weight="bold" fill="#26215C" text-anchor="middle">Packet core (GGSN/PGW)</text>
  <text x="550" y="276" font-size="12" fill="#3C3489" text-anchor="middle">Data session handling</text>

  <line x1="165" y1="291" x2="165" y2="316" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="355" y1="291" x2="355" y2="316" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="550" y1="291" x2="550" y2="316" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 2 -->
  <rect x="80" y="320" width="170" height="56" rx="10" fill="#AFA9EC" stroke="#534AB7" stroke-width="1"/>
  <text x="165" y="344" font-size="14" font-weight="bold" fill="#26215C" text-anchor="middle">SMSC</text>
  <text x="165" y="361" font-size="12" fill="#3C3489" text-anchor="middle">SMS message routing</text>

  <rect x="270" y="320" width="170" height="56" rx="10" fill="#AFA9EC" stroke="#534AB7" stroke-width="1"/>
  <text x="355" y="344" font-size="14" font-weight="bold" fill="#26215C" text-anchor="middle">Billing / OSS-BSS</text>
  <text x="355" y="361" font-size="12" fill="#3C3489" text-anchor="middle">Rating, invoicing, CRM</text>

  <rect x="460" y="320" width="180" height="56" rx="10" fill="#AFA9EC" stroke="#534AB7" stroke-width="1"/>
  <text x="550" y="344" font-size="14" font-weight="bold" fill="#26215C" text-anchor="middle">Fraud / security</text>
  <text x="550" y="361" font-size="12" fill="#3C3489" text-anchor="middle">Monitoring, lawful intercept</text>

  <line x1="165" y1="376" x2="165" y2="401" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="355" y1="376" x2="355" y2="401" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 3 -->
  <rect x="80" y="405" width="260" height="56" rx="10" fill="#AFA9EC" stroke="#534AB7" stroke-width="1"/>
  <text x="210" y="429" font-size="14" font-weight="bold" fill="#26215C" text-anchor="middle">SIM provisioning</text>
  <text x="210" y="446" font-size="12" fill="#3C3489" text-anchor="middle">Activation, number management</text>

  <rect x="360" y="405" width="280" height="56" rx="10" fill="#AFA9EC" stroke="#534AB7" stroke-width="1"/>
  <text x="500" y="429" font-size="14" font-weight="bold" fill="#26215C" text-anchor="middle">Customer service platform</text>
  <text x="500" y="446" font-size="12" fill="#3C3489" text-anchor="middle">Support, activations, complaints</text>

  <!-- External interconnects -->
  <text x="80" y="500" font-size="12" fill="#5F5E5A">External interconnects</text>

  <rect x="80" y="510" width="170" height="50" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
  <text x="165" y="532" font-size="14" font-weight="bold" fill="#04342C" text-anchor="middle">Roaming partners</text>
  <text x="165" y="549" font-size="12" fill="#085041" text-anchor="middle">Other networks, abroad</text>

  <rect x="270" y="510" width="170" height="50" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
  <text x="355" y="532" font-size="14" font-weight="bold" fill="#04342C" text-anchor="middle">Carrier interconnect</text>
  <text x="355" y="549" font-size="12" fill="#085041" text-anchor="middle">Calls to other networks</text>

  <rect x="460" y="510" width="180" height="50" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
  <text x="550" y="532" font-size="14" font-weight="bold" fill="#04342C" text-anchor="middle">Regulator / lawful intercept</text>
  <text x="550" y="549" font-size="12" fill="#085041" text-anchor="middle">Compliance reporting</text>

  <line x1="165" y1="510" x2="165" y2="465" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="355" y1="510" x2="355" y2="465" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="550" y1="510" x2="550" y2="465" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

</svg>