server.port=${PORT:3001}
spring.application.name=vink-backend

vink.jwt.secret=${JWT_SECRET:vink-mvno-dev-secret-change-in-prod}
vink.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true

logging.level.com.vink.backend=INFO
